apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
spec:
  schedule: "0 1 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: {{ .Values.name }}
              image: {{ .Values.image.group }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
              envFrom:
                - configMapRef:
                    name: {{ .Values.config }}
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: docker-registry
      backoffLimit: 4