apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  tls:
    - hosts:
        - api.astro-bot.space
      secretName: tls
    - hosts:
        - staging-api.astro-bot.space
      secretName: tls
  rules:
    - host: api.astro-bot.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: central-api
                port:
                  number: 9001
    - host: staging-api.astro-bot.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: central-api
                port:
                  number: 10001