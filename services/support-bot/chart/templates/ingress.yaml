apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ing
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns"
spec:
  tls:
    - hosts:
        - support-bot.astro-bot.space
      secretName: {{ .Values.name }}-tls
  rules:
    - host: support-bot.astro-bot.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: support-api
                port:
                  number: 9002