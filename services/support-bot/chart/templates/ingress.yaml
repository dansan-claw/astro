apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ing
  namespace: {{ .Values.namespace }}
spec:
  tls:
    - hosts:
        - support-bot.astro-bot.space
{{/*        - staging.support-bot.astro-bot.space*/}}
      secretName: tls-astro-bot.space
  rules:
    - host: support-bot.astro-bot.space
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: support-api
                port:
                  number: 9002
