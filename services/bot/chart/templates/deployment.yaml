apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      annotations:
        random: '0'
    spec:
      nodeSelector:
        node.kubernetes.io/agent: "astro"
      containers:
      - name: {{ .Values.name }}
        image: {{ .Values.image.group }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
        ports:
        - name: metrics
          containerPort: {{ .Values.port }}
        envFrom:
        - configMapRef:
            name: {{ .Values.config }}
        env:
        - name: POD_HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_ORDINAL
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.port }}
            httpHeaders:
              - name: Authorization
                value: {{ .Values.auth }}
          initialDelaySeconds: 120
          periodSeconds: 20
          failureThreshold: 120
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: {{ .Values.port }}
            httpHeaders:
            - name: Authorization
              value: {{ .Values.auth }}
          initialDelaySeconds: 1
          periodSeconds: 5
          failureThreshold: 10
        lifecycle:
          preStop:
            httpGet:
              path: /shutdown
              port: {{ .Values.port }}
              httpHeaders:
                - name: Authorization
                  value: {{ .Values.auth }}
        volumeMounts:
          - name: gcp-bigquery-creds
            mountPath: /etc/astro-bot/secrets
            readOnly: true
      volumes:
      - name: gcp-bigquery-creds
        secret:
          secretName: gcp-bigquery-creds
      imagePullSecrets:
      - name: docker-registry
      terminationGracePeriodSeconds: 30
  serviceName: {{ .Values.name }}
  podManagementPolicy: Parallel
