            - cache delete gradle-wrapper_entitlements-expiration-job
            - cache store gradle-caches_entitlements-expiration-job ~/.gradle/caches
            - cache store gradle-wrapper_entitlements-expiration-job ~/.gradle/wrapper


promotions:
  # bot
  - name: Deploy bot to production
    pipeline_file: deploy/bot/production.yml
  - name: Deploy bot to staging
    pipeline_file: deploy/bot/staging.yml
    auto_promote:
      when: |
        branch = 'develop' and result = 'passed' and change_in(['/services/bot/', '/shared/', '/build.gradle.kts', '/settings.gradle.kts', '/.semaphore/'], { branch_range: '$SEMAPHORE_GIT_COMMIT_RANGE' })

  # central-api
  - name: Deploy central-api to production
    pipeline_file: deploy/central-api/production.yml
  - name: Deploy central-api to staging
    pipeline_file: deploy/central-api/staging.yml
    auto_promote:
      when: |
        branch = 'develop' and result = 'passed' and change_in(['/services/central-api/', '/shared/', '/build.gradle.kts', '/settings.gradle.kts', '/.semaphore/'], { branch_range: '$SEMAPHORE_GIT_COMMIT_RANGE' })

  # bot
  - name: Deploy support-bot to production
    pipeline_file: deploy/support-bot/production.yml
  - name: Deploy support-bot to staging
