        - name: github
      prologue:
        commands:
          - apt-get update -y
          - apt-get install lftp -y
          - cache restore gradle-caches_central-api
          - cache restore gradle-wrapper_central-api
          - checkout
      jobs:
        - name: Build, test and push central-api
          commands:
            - ./gradlew :services:central-api:build
            - ./gradlew :services:central-api:test
            - ./gradlew :services:central-api:jib
      epilogue:
        on_pass:
          commands:
            - cache delete gradle-caches_central-api
            - cache delete gradle-wrapper_central-api
            - cache store gradle-caches_central-api ~/.gradle/caches
            - cache store gradle-wrapper_central-api ~/.gradle/wrapper

  # support-bot
  - name: Build, test and push support bot
    dependencies: [ ]
    run:
      when: |
        change_in(['/services/support-bot/', '/shared/', '/build.gradle.kts', '/settings.gradle.kts', '/.semaphore/'], { branch_range: '$SEMAPHORE_GIT_COMMIT_RANGE' })
    task:
      secrets:
        - name: github
      prologue:
        commands:
          - apt-get update -y
          - apt-get install lftp -y
          - cache restore gradle-caches_support-bot
          - cache restore gradle-wrapper_support-bot
          - checkout
      jobs:
        - name: Build, test and push support-bot
          commands:
            - ./gradlew :services:support-bot:build
            - ./gradlew :services:support-bot:test
            - ./gradlew :services:support-bot:jib
