version: v1.0
name: Main pipeline

agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu1804
  containers:
    - name: main
      image: openjdk:21-buster

blocks:
  # bot
  - name: Build, test and push astro bot
    dependencies: [ ]
    run:
      when: |
        change_in(['/services/bot/', '/shared/', '/build.gradle.kts', '/settings.gradle.kts', '/.semaphore/'], { branch_range: '$SEMAPHORE_GIT_COMMIT_RANGE' })
    task:
      secrets:
        - name: github
      prologue:
        commands:
          - apt-get update -y
          - apt-get install lftp -y
          - cache restore gradle-caches_bot
          - cache restore gradle-wrapper_bot
          - checkout
      jobs:
        - name: Build, test and push bot
          commands:
            - ./gradlew :services:bot:build
            - ./gradlew :services:bot:test
            - ./gradlew :services:bot:jib
      epilogue:
        on_pass:
          commands:
            - cache delete gradle-caches_bot
            - cache delete gradle-wrapper_bot
            - cache store gradle-caches_bot ~/.gradle/caches
            - cache store gradle-wrapper_bot ~/.gradle/wrapper

  # central-api
  - name: Build, test and push central-api
    dependencies: [ ]
    run:
      when: |
        change_in(['/services/central-api/', '/shared/', '/build.gradle.kts', '/settings.gradle.kts', '/.semaphore/'], { branch_range: '$SEMAPHORE_GIT_COMMIT_RANGE' })
    task:
