        on_pass:
          commands:
            - cache delete gradle-caches_support-bot
            - cache delete gradle-wrapper_support-bot
            - cache store gradle-caches_support-bot ~/.gradle/caches
            - cache store gradle-wrapper_support-bot ~/.gradle/wrapper

  # entitlements-expiration-job
  - name: Build, test and push entitlements-expiration-job
    dependencies: [ ]
    run:
      when: |
        change_in(['/services/entitlements-expiration-job/', '/shared/', '/build.gradle.kts', '/settings.gradle.kts', '/.semaphore/'], { branch_range: '$SEMAPHORE_GIT_COMMIT_RANGE' })
    task:
      secrets:
        - name: github
      prologue:
        commands:
          - apt-get update -y
          - apt-get install lftp -y
          - cache restore gradle-caches_entitlements-expiration-job
          - cache restore gradle-wrapper_entitlements-expiration-job
