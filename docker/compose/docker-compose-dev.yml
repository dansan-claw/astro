version: "3.8"
name: "astro-dev-env"

services:
  mongo:
    image: mongo:latest
    container_name: ${COMPOSE_PROJECT_NAME}_mongo
    restart: no
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data
    networks:
      - mongo-network
    environment:
      - MONGO_INITDB_DATABASE=AstroDev
  mongo-express:
    image: mongo-express:latest
    container_name: ${COMPOSE_PROJECT_NAME}_mongo-express
    restart: no
    ports:
      - "8081:8081"
    networks:
      - mongo-network
    environment:
      - ME_CONFIG_MONGODB_SERVER=astro-dev-env_mongo
  redis:
    image: redis:latest
    container_name: ${COMPOSE_PROJECT_NAME}_redis
    restart: no
    volumes:
      - redis:/data
    ports:
      - "6379:6379"
    networks:
      - redis-network
  redis-insight:
    image: redislabs/redisinsight
    container_name: ${COMPOSE_PROJECT_NAME}_redis-insight
    restart: no
    ports:
      - "8082:8001"
    networks:
      - redis-network
  influx:
    image: influxdb:latest
    container_name: ${COMPOSE_PROJECT_NAME}_influx
    restart: no
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: astrouser
      DOCKER_INFLUXDB_INIT_PASSWORD: astropassword
      DOCKER_INFLUXDB_INIT_ORG: astro-org
      DOCKER_INFLUXDB_INIT_BUCKET: astro-logs
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: astroverysecuretoken
volumes:
  redis:
  mongo:

networks:
  mongo-network:
    name: mongo-network
  redis-network:
    name: redis-network
